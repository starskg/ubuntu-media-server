<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreamFlow Proxy Engine</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">

    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
</head>

<body>

    <div class="glass-card">
        <h1 class="brand-title">STREAMFLOW PROXY</h1>
        <div class="divider"></div>

        <div class="text-start mb-2">
            <small class="text-muted text-uppercase" style="font-size: 0.65rem;">Source Stream URL</small>
        </div>

        <div class="input-box">
            <input type="text" id="sourceUrl" placeholder="http://server-ip:port/live/stream.m3u8">
            <button class="btn-play-src" onclick="playUrl('source')" title="Play Source directly">
                <i class="fas fa-play"></i>
            </button>
            <button class="btn-gen" onclick="generateOnly()">GENERATE PROXY</button>
        </div>

        <div class="result-container">
            <div id="result" class="result-area" onclick="copyResult()" title="Click to copy">
                Proxy link will appear here...
            </div>
            <button class="btn-play-proxy" onclick="playUrl('proxy')" title="Play Proxy link">
                <i class="fas fa-play"></i>
            </button>
        </div>

        <div id="playerSection">
            <div class="player-info" id="playingNow">Currently Playing: ...</div>
            <div class="player-container">
                <video id="video" controls></video>
            </div>
        </div>

        <div class="d-flex flex-wrap justify-content-center mt-4">
            <a href="#" class="btn-custom"><i class="fab fa-github"></i> Documentation</a>
            <a href="#" class="btn-custom"><i class="fas fa-code-branch"></i> Repository</a>
        </div>
    </div>

    <div id="toast" class="copy-toast">Link Copied!</div>

    <script src="script.js"></script>
</body>

</html>
